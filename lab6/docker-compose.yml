version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: penguins_db
    ports:
      - "5435:5432"

  app:
    build: .
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/penguins_db
    depends_on:
      - db